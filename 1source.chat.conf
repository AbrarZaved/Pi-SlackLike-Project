upstream django_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name 1source.chat www.1source.chat;

    # Serve static files directly via Nginx
    location /static/ {
        alias /home/ubuntu/app/Pi-SlackLike-Project/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Serve media files directly via Nginx
    location /media/ {
        alias /home/ubuntu/app/Pi-SlackLike-Project/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy to Daphne / Channels for HTTP and WebSockets
    location / {
        proxy_pass http://django_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        
        # Real IP headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
